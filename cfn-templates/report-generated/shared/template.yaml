AWSTemplateFormatVersion: '2010-09-09'
Description: 'report-generated shared infrastructure — DynamoDB table and SSM parameters'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]

Resources:
  ReportGeneratedDataTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::Region}-report-generated-data-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - {AttributeName: PK, AttributeType: S}
        - {AttributeName: SK, AttributeType: S}
        - {AttributeName: name, AttributeType: S}
        - {AttributeName: updated_at, AttributeType: S}
      KeySchema:
        - {AttributeName: PK, KeyType: HASH}
        - {AttributeName: SK, KeyType: RANGE}
      GlobalSecondaryIndexes:
        - IndexName: name-updated-index
          KeySchema:
            - {AttributeName: name, KeyType: HASH}
            - {AttributeName: updated_at, KeyType: RANGE}
          Projection: {ProjectionType: ALL}
      Tags:
        - {Key: Environment, Value: !Ref Environment}
        - {Key: Project, Value: report-generated}

  # SSM Parameters
  TableNameParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/report-generated/${Environment}/dynamodb/table-name'
      Type: String
      Value: !Ref ReportGeneratedDataTable

  TableArnParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/report-generated/${Environment}/dynamodb/table-arn'
      Type: String
      Value: !GetAtt ReportGeneratedDataTable.Arn

Outputs:
  TableName:
    Value: !Ref ReportGeneratedDataTable
    Export: {Name: !Sub '${AWS::StackName}-TableName'}
  TableArn:
    Value: !GetAtt ReportGeneratedDataTable.Arn
    Export: {Name: !Sub '${AWS::StackName}-TableArn'}
