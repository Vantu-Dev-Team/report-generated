AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'sento-builder — FastAPI backend + DynamoDB configs table'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stage, prod]
  UbidotsToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: Ubidots API token (optional — can also be sent per-request via X-Ubidots-Token header)

Globals:
  Function:
    Timeout: 30
    Runtime: python3.12
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DYNAMO_TABLE: !Ref ConfigsTable
        AWS_REGION_NAME: !Ref AWS::Region
        UBIDOTS_TOKEN: !Ref UbidotsToken

Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  ConfigsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub '${AWS::Region}-sento-builder-configs-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: config_id
          AttributeType: S
      KeySchema:
        - AttributeName: config_id
          KeyType: HASH

  # ── IAM Role ──────────────────────────────────────────────────────────────
  ApiFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::Region}-sento-builder-api-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                Resource: !GetAtt ConfigsTable.Arn

  # ── Lambda + API Gateway ──────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::Region}-sento-builder-api-${Environment}'
      CodeUri: .
      Handler: lambda_function.handler
      Role: !GetAtt ApiFunctionRole.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /{proxy+}
            Method: ANY
            Auth:
              Authorizer: CognitoAuthorizer
        RootEvent:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /
            Method: ANY
            Auth:
              Authorizer: CognitoAuthorizer
    Metadata:
      BuildMethod: python3.12

  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub '${AWS::Region}-sento-builder-api-${Environment}'
      StageName: !Ref Environment
      EndpointConfiguration:
        Type: REGIONAL
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/us-east-1_OVlXl5RFG'
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Ubidots-Token'"
        AllowOrigin: "'*'"

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::Region}-sento-builder-api-${Environment}'
      RetentionInDays: 14

  # ── Custom Domain ─────────────────────────────────────────────────────────
  ApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: analytics.sentoapp.net
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: analytics.sentoapp.net
          HostedZoneId: Z06978332ZE0S2JYD2EEL

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: analytics.sentoapp.net
      RegionalCertificateArn: !Ref ApiCertificate
      EndpointConfiguration:
        Types: [REGIONAL]
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    DependsOn: ApiStage
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref Api
      Stage: !Ref Environment

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: Z06978332ZE0S2JYD2EEL
      Name: analytics.sentoapp.net
      Type: CNAME
      TTL: '300'
      ResourceRecords:
        - !GetAtt ApiCustomDomain.RegionalDomainName

Outputs:
  ApiUrl:
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Description: API URL (execute-api)
  CustomDomainUrl:
    Value: https://analytics.sentoapp.net
    Description: API URL (custom domain)
  TableName:
    Value: !Ref ConfigsTable
    Description: DynamoDB table name
