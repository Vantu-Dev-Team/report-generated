[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | __pycache__
  | \.venv
  | venv
  | \.eggs
  | \.pytest_cache
  | build
  | dist
  | node_modules
)/
'''

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
ignore_missing_imports = true
exclude = [
    'tests/',
    'build/',
    'dist/',
    '\.venv/',
    'venv/',
    'node_modules/',
]

[[tool.mypy.overrides]]
module = [
    "boto3.*",
    "botocore.*",
    "mangum.*",
]
ignore_missing_imports = true

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", "build", "dist", "node_modules"]
skips = ["B101"]  # Skip assert_used test

[tool.flake8]
max-line-length = 100
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    ".eggs",
    "*.egg",
    "build",
    "dist",
    ".pytest_cache",
    "htmlcov",
    ".coverage",
    "node_modules",
]
ignore = ["E203", "E501", "W503"]
per-file-ignores = [
    "__init__.py:F401",
]
max-complexity = 10
